{% extends "base.html" %}
{% block title %}Sign Up — FoodExpress{% endblock %}

{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card-modern p-4 p-md-5">
                <div class="text-center mb-4">
                    <h2 class="section-title">Create account</h2>
                    <p class="small" style="color:var(--gray-400);">Join FoodExpress and start ordering</p>
                </div>
                <form method="POST">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">First Name</label>
                            <input type="text" name="first_name" class="form-control search-bar" placeholder="Bazil" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-bold">Last Name</label>
                            <input type="text" name="last_name" class="form-control search-bar" placeholder="Khan" required>
                        </div>
                    </div>
                    <div class="mb-3 mt-3">
                        <label class="form-label small fw-bold">Email</label>
                        <input type="email" name="email" class="form-control search-bar" placeholder="you@example.com" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Phone</label>
                        <input type="text" name="phone" class="form-control search-bar" placeholder="0300-1234567">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-bold">Address</label>
                        <input type="text" name="address" class="form-control search-bar" placeholder="Your delivery address">
                    </div>
                    <div class="mb-4">
                        <label class="form-label small fw-bold">Password</label>
                        <input type="password" name="password" class="form-control search-bar" placeholder="Create a password" required minlength="6">
                    </div>
                    <button type="submit" class="btn btn-accent w-100 py-2">Create Account</button>
                </form>
                <p class="text-center small mt-3 mb-0" style="color:var(--gray-400);">
                    Already have an account? <a href="{{ url_for('login') }}" style="color:var(--accent);font-weight:600;">Log in</a>
                </p>
            </div>
        </div>
    </div>
</div>
{% endblock %}
